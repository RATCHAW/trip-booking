name: trip-booking

services:
  postgres:
    image: postgres
    container_name: trip-booking-postgres
    environment:
      POSTGRES_DB: trip-booking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - trip-booking_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  trip-booking_postgres_data:
